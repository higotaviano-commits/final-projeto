name: Java CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Clonar repositório
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔹 Configurar Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔹 Cache do Maven (melhora performance)
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # 🔹 Build do projeto
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 🔥 Lint básico (Checkstyle)
      - name: Run Checkstyle
        run: |
          mkdir checkstyle
          curl -L -o checkstyle/checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.1/checkstyle-10.12.1-all.jar
          java -jar checkstyle/checkstyle.jar -c /google_checks.xml src/ || true